name: Test on Ubuntu

on: [push]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install requests
        run: pip install requests

      - name: Test different User-Agents and URLs
        run: |
          python3 -c "
          import requests

          subreddit = 'programming'
          tests = [
              ('www + browser UA', 'https://www.reddit.com/r/{}/about.json'.format(subreddit), 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36'),
              ('www + simple UA', 'https://www.reddit.com/r/{}/about.json'.format(subreddit), 'Mozilla/5.0'),
              ('old reddit', 'https://old.reddit.com/r/{}/about.json'.format(subreddit), 'Mozilla/5.0'),
              ('www json', 'https://www.reddit.com/r/{}.json'.format(subreddit), 'Mozilla/5.0'),
          ]
          for name, url, ua in tests:
              try:
                  r = requests.get(url, headers={'User-Agent': ua}, allow_redirects=False, timeout=10)
                  print('{}: STATUS={}'.format(name, r.status_code))
                  if r.status_code == 200:
                      data = r.json()
                      subs = data.get('data', {}).get('subscribers', 'N/A')
                      print('  SUBSCRIBERS:', subs)
              except Exception as e:
                  print('{}: ERROR - {}'.format(name, e))
          "
