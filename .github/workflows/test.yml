name: Test on Ubuntu

on: [push]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install requests
        run: pip install requests

      - name: Debug 0-subs.py
        run: |
          cd api_advanced
          python3 -c "
          import sys, traceback
          sys.path.insert(0, '.')

          # Test what exception occurs
          import urllib.request, json
          url = 'https://www.reddit.com/r/programming/about.json'
          headers = {'User-Agent': 'python:alu.api.advanced:v1.0 (by /u/alu)'}
          req = urllib.request.Request(url, headers=headers)
          try:
              with urllib.request.urlopen(req) as r:
                  data = json.loads(r.read().decode('utf-8'))
                  subs = data.get('data', {}).get('subscribers', 0)
                  print('SUBSCRIBERS:', subs)
          except Exception as e:
              print('EXCEPTION TYPE:', type(e).__name__)
              print('EXCEPTION MSG:', str(e))
              traceback.print_exc()

          # Also test with requests
          print('--- Testing with requests ---')
          try:
              import requests
              r = requests.get(url, headers=headers, allow_redirects=False, timeout=10)
              print('STATUS:', r.status_code)
              if r.status_code == 200:
                  print('SUBSCRIBERS:', r.json().get('data',{}).get('subscribers'))
          except Exception as e:
              print('REQUESTS EXCEPTION:', type(e).__name__, str(e))
          "
